apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: telemetry-api
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: 'https://github.com/kamilekbeznosa/IaacProjects.git' 
    targetRevision: main
    path: GitOps/clusters/telemetry-api 
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true